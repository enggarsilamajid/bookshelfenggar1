<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookshelf App</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@100..1000&display=swap" rel="stylesheet">

  <script defer src="main.js"></script>
</head>

<body>

<header>
  <h1>Bookshelf App</h1>
</header>

<main>

  <!-- LEFT SIDE -->
  <div class="leftSide">

    <!-- SEARCH -->
    <section class="findBook">
      <h2>Cari Buku</h2>

      <form id="searchBook">

        <label for="searchBookTitle">Judul</label>

        <input
          id="searchBookTitle"
          type="text"
          placeholder="...Ketik Judul Buku"
        >

        <button type="submit">
          🔍
        </button>

      </form>
    </section>


    <!-- INPUT BOOK -->
    <section class="inputBook">

      <h2>Tambah Buku Baru</h2>

      <form id="bookForm">

        <div>
          <label for="bookFormTitle">Judul</label>

          <input
            id="bookFormTitle"
            type="text"
            required
          >
        </div>

        <div>
          <label for="bookFormAuthor">Penulis</label>

          <input
            id="bookFormAuthor"
            type="text"
            required
          >
        </div>

        <div>
          <label for="bookFormYear">Tahun</label>

          <input
            id="bookFormYear"
            type="number"
            required
          >
        </div>

        <div>
          <label for="bookFormIsComplete">Selesai dibaca</label>

          <input
            id="bookFormIsComplete"
            type="checkbox"
          >
        </div>

        <button
          id="bookFormSubmit"
          type="submit"
        >
          Masukkan Buku ke rak
        </button>

      </form>

    </section>

  </div>


  <!-- RIGHT SIDE -->
  <div class="rightSide">

    <div class="rightSideInside">

      <!-- BELUM SELESAI -->
      <section class="notCompletedRead">

        <div class="rightSideHeader">

          <h2>Belum selesai dibaca</h2>

          <button id="changeToCompleteButton">
            Selesai dibaca
          </button>

        </div>

        <div id="incompleteBookList"></div>

      </section>


      <!-- SELESAI -->
      <section class="completedRead">

        <div class="rightSideHeader">

          <button id="changeToNotCompleteButton">
            Belum selesai dibaca
          </button>

          <h2>Selesai dibaca</h2>

        </div>

        <div id="completeBookList"></div>

      </section>

    </div>

  </div>

</main>


<!-- MODAL RESULT -->
<div id="resultModal" class="modal">

  <div class="modal-inner">

    <div class="modal-content">

      <p id="modalMessage" class="modalDialogMessage"></p>

      <button id="closeModal" class="modal-button">
        Tutup
      </button>

    </div>

  </div>

</div>


<!-- MODAL CONFIRM -->
<div id="confirmModal" class="modal">

  <div class="modal-inner">

    <div class="modal-content">

      <p id="modalConfirmMessage" class="modalDialogMessage"></p>

      <div id="confirmButtonContainer">

        <button id="confirmDelete" class="confirm-modal-button">
          Ya, hapus
        </button>

        <button id="cancelDelete" class="confirm-modal-button">
          Batal
        </button>

      </div>

    </div>

  </div>

</div>

</body>
</html>
