<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookshelf App</title>

  <link rel="stylesheet" href="style.css">
  <script defer src="main.js"></script>
</head>

<body>

<header>
  <h1>Bookshelf App</h1>
</header>

<main>

  <!-- FORM TAMBAH / EDIT BUKU -->
  <section class="inputBook">
    <h2>Tambah Buku</h2>

    <form id="bookForm">

      <div>
        <label for="bookFormTitle">Judul</label>
        <input
          id="bookFormTitle"
          type="text"
          required
        >
      </div>

      <div>
        <label for="bookFormAuthor">Penulis</label>
        <input
          id="bookFormAuthor"
          type="text"
          required
        >
      </div>

      <div>
        <label for="bookFormYear">Tahun</label>
        <input
          id="bookFormYear"
          type="number"
          required
        >
      </div>

      <div>
        <label for="bookFormIsComplete">Selesai dibaca</label>
        <input
          id="bookFormIsComplete"
          type="checkbox"
        >
      </div>

      <button type="submit">
        Simpan Buku
      </button>

    </form>
  </section>


  <!-- SWITCH RAK -->
  <section class="switchShelf">

    <button id="showUnread">
      Belum selesai dibaca
    </button>

    <button id="showComplete">
      Selesai dibaca
    </button>

  </section>


  <!-- DAFTAR BUKU -->
  <section class="bookListSection">

    <div id="bookList"></div>

  </section>

</main>


<!-- MODAL PESAN -->
<div id="resultModal" class="modal">

  <div class="modal-inner">

    <div class="modal-content">

      <p id="modalMessage"></p>

      <button id="closeModal">
        Tutup
      </button>

    </div>

  </div>

</div>

</body>
</html>
